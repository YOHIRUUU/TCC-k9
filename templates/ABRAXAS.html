<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="../static/style4.css">
    <link rel="icon" type="image/png" href="static/senai.png">
</head>

<body>
    <nav id="navbar" class="navbar navbar-expand-lg navbar-custom fixed-top">
        <li class="nav-item">
            <a class="nav-link" href="/"><img src="../static/senai2.png" id="logo"></a>
        </li>
        <div class="container-fluid">
            <a class="navbar-brand ms-2 fw-bold" href="" id="tituloEstoque">Almoxarifado</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/cadastrar">Cadastrar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/adicionar">Adicionar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/anubis">Movimentação</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/"><img src="../static/account_circle.png" id="logo"></a>
                    </li>
                </ul>
                <li class="nav-item">
                    <a class="nav-link" href="/back">.</a>
                </li>
            </div>
        </div>
    </nav>

    <div class="caixa-fade">
        <div id="container">
            <div id="elemento">
                <div id="card">
                    <h3 id="titulo">Estoque</h3>
                    <table class="table table-striped table-hover" id="tabela">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Quantidade</th>
                                <th>Preco</th>
                                <th>Categoria</th>
                                <th>descrição</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in registros %}
                            <tr>
                                <td>{{ item.id }}</td>
                                <td>{{ item.nome }}</td>
                                <td>{{ item.quantidade }}</td>
                                <td>{{ item.preco }}</td>
                                <td>{{ item.categoria }}</td>
                                <td>{{ item.descricao }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
</body>

</html>
