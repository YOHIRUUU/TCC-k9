<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../static/style4.css">
    
</head>
<body>

    <nav id="navbar" class="navbar navbar-expand-lg navbar-custom fixed-top">
                <li class="nav-item">
                    <a class="nav-link" href="/"><img src="../static/senai2.png" id="logo"></a>
                </li>
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse">
                <div id="nav-tudo">
                    <ul class="navbar-nav ms-auto">
                        <li id="nav-item">
                            <a class="nav-link active" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/cadastrar">Cadastrar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/ABRAXAS">Estoque</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/adicionar">Adicionar</a>
                        </li>
                    </div>
                </ul>
            </div>
        </div>
    </nav>
    <div id="elemento">
        <a id="tituloEstoque">Almoxarifado</a>
        <div id="card">
            <h3 id="titulo">Estoque</h3>
            <table class="table table-striped table-hover" id="tabela">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>Categoria</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in data %}
                    <tr>
                        <td>{{ usuario }}</td>
                        <td>{{ email }}</td>
                        <td>{{ item.id }}</td>
                        <td>{{ item.nome }}</td>
                        <td>{{ item.preco }}</td>
                        <td>{{ item.quantidade }}</td>
                        <td>{{ item.categoria }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
