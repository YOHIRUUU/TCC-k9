<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Old+Turkic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../app.py">
    <link rel="icon" type="image/png" href="static/senai.png">
</head>

<body>
    <div id="container">
        <div id="container">
            <div id="carrossel">
                <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active" data-bs-interval="2000">
                            <img src="../static/robotista.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img src="../static/eletronica2.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img src="../static/cursos-tecnicos.jpg" class="d-block w-100">
                        </div>
                    </div>
                </div>
            </div>
            <div id="corpo">
                <form id="login-box" action="/ABRAXAS" method="GET">
                    <img src="../static/senai2.png" id="logo">
                    <br>
                    <br>
                    <br>
                    <div class="mb-3">
                        <label>Usuário:</label>
                        <input type="text" class="form-control" placeholder="Digite seu Nome" required>
                    </div>
                    <div class="mb-3">
                        <label>E-mail:</label>
                        <input type="email" class="form-control" placeholder="Digite seu E-mail" required>
                    </div>
                    <div class="mb-3">
                        <label>Senha:</label>
                        <input type="password" class="form-control" placeholder="Digite sua Senha" required>
                    </div>
                    <br>
                    <button onclick="href='/ABRAXAS'" type="submit" class="btn btn-primary w-100 mb-2" id="botao_acao">
                        Entrar
                    </button>

                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
