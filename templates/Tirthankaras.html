<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../app.py">
    <link rel="icon" type="image/png" href="static/senai.png">
</head>

<body>
    <div id="container">
        <div id="carrossel">
            <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active" data-bs-interval="2000">
                        <img src="../static/robotista.jpg" class="d-block w-100">
                    </div>
                    <div class="carousel-item" data-bs-interval="2000">
                        <img src="../static/eletronica2.jpg" class="d-block w-100">
                    </div>
                    <div class="carousel-item" data-bs-interval="2000">
                        <img src="../static/cursos-tecnicos.jpg" class="d-block w-100">
                    </div>
                </div>
            </div>
        </div>
        <div id="corpo">
            <form id="login-box" action="/ABRAXAS" method="GET">
                <img src="../static/senai2.png" id="logo">
                <br>
                <br>
                <div class="mb-3">
                    <label>Novo Usuário:</label>
                    <input type="text" class="form-control" placeholder="Digite seu Nome" required>
                </div>
                <div class="mb-3">
                    <label>E-mail:</label>
                    <input type="email" class="form-control" placeholder="Digite seu E-mail" required>
                </div>
                <div class="mb-3">
                    <label>Senha:</label>
                    <input type="password" class="form-control" placeholder="Digite sua Senha" required>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
                    <label class="form-check-label" for="switchCheckDefault">Admin</label>
                </div>
                <br>
                <div>
                    <!-- coisa do sql-->
                    <button onclick="window.location.href='/ABRAXAS'" type="submit" class="btn btn-primary w-100 mb-2"
                        id="botao_acao">
                        Cadastrar novo usuario
                    </button>
                    <!-- esse botao dai ↑-->
                    <br>
                    <button onclick="window.location.href='/'" type="submit" class="btn btn-primary w-100 mb-2"
                        id="botao_acao">
                        Voltar para Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
