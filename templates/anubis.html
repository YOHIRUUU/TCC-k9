<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../static/style4.css">
    <link rel="icon" type="image/png" href="static/senai.png">

</head>

<body>
    <nav id="navbar" class="navbar navbar-expand-lg navbar-custom fixed-top">
        <li class="nav-item">
            <a class="nav-link" href="/"><img src="../static/senai2.png" id="logo"></a>
        </li>
        <div class="container-fluid">
            <a class="navbar-brand ms-2 fw-bold" href="#" id="tituloEstoque">Almoxarifado</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tirthankaras">Cadastrar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ABRAXAS">Estoque</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/Bodhisattvas">Adicionar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/"><img src="../static/account_circle.png" id="logo"></a>
                    </li>
                </ul>
                <li class="nav-item">
                    <a class="nav-link">.</a>
                </li>
            </div>
        </div>
    </nav>

    <div class="caixa-fade">
        <div id="elemento">
            <div id="Adicionar-item">
                <h3 id="titulo">Movimentação</h3>
                <br>
                <form class="row g-3" action="/adicionar" method="POST" enctype="multipart/form-data">
                    <select class="form-select" name="item_selecionado" aria-label="Default select example">
                        <option value="" selected disabled>Escolha o Item</option>  
                        {% for item in registros %}
                            <option value="{{ item.id }}">{{ item.nome }}</option>
                        {% endfor %}
                    </select>
                    <div class="col-12">
                        <label for="inputAddress2" class="form-label">Quantidade</label>
                        <input type="number" min="0" name="Quantidade" class="form-control" id="inputAddress2">
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1" checked>
                        <label class="form-check-label" for="Adicionar Itens">
                            Adicionar Itens
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2">
                        <label class="form-check-label" for="Retirar Itens">
                            Retirar Itens
                        </label>
                    </div>
                    <div class="col-12" id="Regiscao">
                        <button type="submit" class="btn btn-primary">
                            Registrar Mudança
                        </button>
                    </div>
            </div>
        </div>
    </div>
    </form>
</body>

</html>
